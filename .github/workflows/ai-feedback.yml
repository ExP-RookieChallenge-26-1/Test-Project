name: AI Feedback on Push

on:
  push:
    branches:
      - main
      - dev
      - develop

permissions:
  contents: write

jobs:
  collect-ai-commits:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
      filtered_shas: ${{ steps.filter.outputs.filtered_shas }}
    steps:
      - name: Filter pushed commits with [AI] prefix
        id: filter
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os

          event_path = os.environ["GITHUB_EVENT_PATH"]

          with open(event_path, "r", encoding="utf-8") as f:
              event = json.load(f)

          commits = event.get("commits", [])
          matched = []

          for commit in commits:
              message = commit.get("message", "")
              title = message.splitlines()[0] if message else ""
              sha = commit.get("id", "")

              print(f"[DEBUG] title={title}")
              print(f"[DEBUG] sha={sha}")

              if title.startswith("[AI]"):
                  matched.append(sha)

          should_run = "true" if matched else "false"
          filtered_shas_json = json.dumps(matched, ensure_ascii=False)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"should_run={should_run}\n")
              out.write(f"filtered_shas={filtered_shas_json}\n")

          print(f"[RESULT] should_run={should_run}")
          print(f"[RESULT] filtered_shas={filtered_shas_json}")
          PY

  call-ai-feedback:
    needs: collect-ai-commits
    if: needs.collect-ai-commits.outputs.should_run == 'true'
    uses: ExP-RookieChallenge-26-1/club-automation/.github/workflows/ai-push-feedback.yml@main
    with:
      target_branches: '["main","dev","develop"]'
      max_files: 10
      max_patch_chars: 4000
      filtered_commit_shas: ${{ needs.collect-ai-commits.outputs.filtered_shas }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
